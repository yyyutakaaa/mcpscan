id: MCP302
title: URL with embedded credentials
severity: medium
category: exfiltration
applies_to: [any_text]
matchers:
  - type: regex
    pattern: "[a-zA-Z][a-zA-Z0-9+.-]*://[^/\\s:@'\"]+:[^/\\s:@'\"]+@[^\\s'\"]+"
description: >
  A URL of the form scheme://user:password@host leaks credentials to anyone who
  can read this file, and to any endpoint the URL is sent to.
remediation: Move credentials out of URLs into environment variables or a secrets manager.
